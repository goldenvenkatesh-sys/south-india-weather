name: Auto-Update South India Weather Map

on:
  schedule:
    # Triggers every single day at 02:30 AM UTC (8:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch: # Gives you a button to trigger an update manually anytime

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          

      - name: Install Ingestion Libraries
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests plotly

      - name: Run Weather Pipeline
        run: python dotplot.py

      - name: Setup GitHub Pages Infrastructure
        uses: actions/configure-pages@v5

      - name: Upload Web Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Live Map to Pages
        id: deployment
        uses: actions/deploy-pages@v4
